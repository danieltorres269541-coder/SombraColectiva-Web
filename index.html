<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SombraColectiva - Mapa Ciudadano</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h2 style="text-align: center; font-family: Arial;">SombraColectiva: Identifica Islas de Calor</h2>
    
    <div id="mapaPrincipal" style="height: 500px; width: 90%; margin: 0 auto; border: 2px solid #ccc; border-radius: 10px;"></div>

    <div id="modalEvidencia" class="modal">
        <div class="modal-contenido">
            <span class="cerrar" onclick="cerrarFormulario()">&times;</span>
            <h3 style="margin-top: 0;">Subir Evidencia Fotográfica</h3>
            <p>Sube una foto clara del área en Navojoa donde hace falta sombra.</p>
            
            <input type="file" id="fotoEvidencia" accept="image/*" style="margin-bottom: 20px;">
            <textarea id="textoDescripcion" placeholder="Breve descripción (ej. Aquí talaron un árbol, hace falta sombra para esperar el camión...)" style="width: 100%; margin-top: 10px; margin-bottom: 10px; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-family: Arial; resize: none;" rows="3"></textarea>
            
            <button onclick="guardarReporte()" style="background: #28a745; color: white; border: none; padding: 10px; cursor: pointer; width: 100%; border-radius: 5px; font-weight: bold;">
                Enviar Reporte
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    
    <script src="js/main.js"></script>
</body>
</html>
