<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sombra Colectiva - Navojoa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🌳 Sombra Colectiva</h1>
            <p>Mapeo de urgencia forestal en Navojoa</p>
        </div>
        <div id="userPanel" class="user-panel">
            <button id="btnAbrirLogin" onclick="document.getElementById('modalLogin').style.display='block'">🔑 Acceso ONG</button>
            <div id="infoAdmin" style="display: none;">
                <span id="txtAdminEmail"></span>
                <button onclick="cerrarSesion()" class="btn-salir">Salir</button>
            </div>
        </div>
    </header>

    <main class="contenedor-principal">
        <section id="seccionGaleria">
            <div class="galeria-encabezado">
                <h2>📢 Fotos Recientes</h2>
                <span id="contadorReportes">Cargando...</span>
            </div>
            <div class="contenedor-filtro">
                <select id="filtroCategoria" onchange="filtrarReportes()">
                    <option value="Todos">🌍 Ver todos los reportes</option>
                    <option value="MasVotados">🔥 Ver los más votados</option>
                    <option value="🚌 Parada de camión">🚌 Paradas de camión</option>
                    <option value="🚶 Banqueta / Peatonal">🚶 Banquetas</option>
                    <option value="🌲 Parque / Área verde">🌲 Parques</option>
                    <option value="🏥 Escuela / Hospital">🏥 Escuelas / Hospitales</option>
                </select>

                <select id="filtroEstado" onchange="filtrarReportes()" style="padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; width: 100%; max-width: 300px;">
                    <option value="Todos">🔴🟡🟢 Todos los estados</option>
                    <option value="Pendiente">🔴 Solo Pendientes</option>
                    <option value="En proceso">🟡 Solo En proceso</option>
                    <option value="Solucionado">🟢 Solo Solucionados</option>
                </select>

            </div>
            <div id="contenedorImagenes" class="galeria-grid"></div>
        </section>

        <section id="seccionMapa">
            <div id="mapaPrincipal"></div>
            <div class="controles-mapa">
                <button onclick="ubicarUsuario()" class="btn-circular">📍</button>
            </div>
        </section>
    </main>

    <div id="modalEvidencia" class="modal">
        <div class="modal-contenido">
            <h3>Subir Evidencia</h3>
            <label>Tipo de lugar:</label>
            <select id="categoriaReporte">
                <option value="" disabled selected>Selecciona una opción</option>
                <option value="🚌 Parada de camión">🚌 Parada de camión</option>
                <option value="🚶 Banqueta / Peatonal">🚶 Banqueta / Peatonal</option>
                <option value="🌲 Parque / Área verde">🌲 Parque / Área verde</option>
                <option value="🏥 Escuela / Hospital">🏥 Escuela / Hospital</option>
                <option value="❓ Otro">❓ Otro</option>
            </select>
            <label>Foto de la zona:</label>
            <input type="file" id="fotoEvidencia" accept="image/*">
            <label>Descripción:</label>
            <textarea id="textoDescripcion" placeholder="Ej: No hay árboles..."></textarea>
            <div class="modal-botones">
                <button onclick="cerrarFormulario()" class="btn-cancelar">Cancelar</button>
                <button id="btnSubir" onclick="guardarReporte()" class="btn-primario">Subir Reporte</button>
            </div>
        </div>
    </div>

    <div id="modalLogin" class="modal">
        <div class="modal-contenido">
            <h3>Panel ONG</h3>
            <input type="email" id="loginEmail" placeholder="Correo electrónico">
            <input type="password" id="loginPass" placeholder="Contraseña">
            <div class="modal-botones">
                <button onclick="document.getElementById('modalLogin').style.display='none'" class="btn-cancelar">Cerrar</button>
                <button onclick="iniciarSesion()" class="btn-primario">Entrar</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
